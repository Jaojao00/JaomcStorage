name: JaomcStorage
version: 2.0
main: me.kt.jaostorage.Main
api-version: 1.20
author: Tài Nguyễn
description: >
  Plugin kho lưu trữ khoáng sản nâng cấp v2.0 cho server Skyblock.
  Hỗ trợ AutoStore, Coop, Economy (Vault), SQLite database,
  GUI thân thiện, PlaceholderAPI, và quản trị chuyên sâu.

commands:
  kho:
    description: Quản lý kho cá nhân (mở, cất, rút, coop, bán)
    usage: /kho [store|take|coop|info|open|add|remove]
    permission: jaostorage.kho
    permission-message: §cBạn không có quyền dùng lệnh này!

  autostore:
    description: Bật / tắt chế độ tự động lưu vật phẩm khi khai thác
    usage: /autostore
    permission: jaostorage.autostore
    permission-message: §cBạn không có quyền dùng lệnh này!

  jaostorage:
    description: Lệnh quản trị plugin JaomcStorage (reload, debug, infinity)
    usage: /jaostorage [reload|open|add|remove|infinity|info|cleanup]
    permission: jaostorage.admin
    permission-message: §cBạn không có quyền thực hiện lệnh này!

permissions:
  jaostorage.kho:
    description: Quyền truy cập kho cá nhân và lệnh coop
    default: true

  jaostorage.autostore:
    description: Quyền bật chế độ auto-store
    default: true

  jaostorage.admin:
    description: Quyền quản trị toàn bộ plugin (reload, infinity, open kho người khác)
    default: op

depend:
  - Vault

softdepend:
  - PlaceholderAPI
