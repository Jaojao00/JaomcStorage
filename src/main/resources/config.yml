######################################################################
# 📦 JAOMCSTORAGE 2.0 - CONFIGURATION FILE                          #
# ✍️ Developed by Tài Nguyễn (c) 2025                                #
# 💾 Database: SQLite | Economy: Vault                               #
######################################################################

# =====================================================================
# ⚙️ CÀI ĐẶT CHÍNH
# =====================================================================

# ✅ Tự động lưu vật phẩm khai thác vào kho người chơi
PickupToStorage: true

# ⛔ Chặn khai thác block nếu kho đầy (người chơi không thể đào nếu hết dung lượng)
BlockedMining: true

# 🎒 Chỉ lưu vào kho nếu túi đồ đã đầy (false = luôn lưu vào kho)
OnlyStoreWhenInvFull: false

# 🔊 Âm thanh khi thêm vật phẩm vào kho (để trống để tắt)
PickupSound: ENTITY_ITEM_PICKUP

# 📣 Hiện thông báo ActionBar khi thu vật phẩm
UseActionBar: true

# =====================================================================
# 🌍 BLACKLIST THẾ GIỚI - Thế giới KHÔNG áp dụng AutoStore
# =====================================================================
BlacklistWorlds:
  - world_nether
  - world_the_end

# =====================================================================
# 🚫 BLACKLIST VẬT PHẨM - Không tự động lưu vào kho
# =====================================================================
Blacklist:
  - DIAMOND_PICKAXE
  - TNT

# =====================================================================
# ✅ WHITELIST VẬT PHẨM - Chỉ lưu các vật phẩm này (bỏ trống = lưu tất cả)
# =====================================================================
Whitelist:
  - COAL
  - RAW_IRON
  - RAW_COPPER
  - RAW_GOLD
  - REDSTONE
  - LAPIS_LAZULI
  - EMERALD
  - DIAMOND
  - QUARTZ
  - STONE
  - COBBLESTONE
  - GOLD_NUGGET
  - IRON_INGOT
  - COPPER_INGOT
  - GOLD_INGOT
  - NETHERITE_SCRAP

# =====================================================================
# 🏷️ TÊN HIỂN THỊ - Tên tiếng Việt trong GUI
# =====================================================================
FormatName:
  COAL: "&7Than"
  RAW_IRON: "&fQuặng Sắt"
  RAW_COPPER: "&6Đồng Thô"
  RAW_GOLD: "&eQuặng Vàng"
  REDSTONE: "&cĐá Đỏ"
  LAPIS_LAZULI: "&9Ngọc Lưu Ly"
  EMERALD: "&aNgọc Lục Bảo"
  DIAMOND: "&bKim Cương"
  QUARTZ: "&fThạch Anh"
  COBBLESTONE: "&8Đá Cuội"
  STONE: "&7Đá"
  GOLD_NUGGET: "&6Mảnh Vàng"
  IRON_INGOT: "&fThỏi Sắt"
  COPPER_INGOT: "&6Thỏi Đồng"
  GOLD_INGOT: "&eThỏi Vàng"
  NETHERITE_SCRAP: "&4Mảnh Netherite"

# =====================================================================
# 📝 LORE HIỂN THỊ - Mô tả trong GUI (hỗ trợ {amount} và {price})
# =====================================================================
FormatLore:
  COAL:
    - "&7Bạn đang có &8{amount} viên than"
    - "&6Giá bán: &e{price}/cái"
    - "&eClick để xem tùy chọn"
  RAW_IRON:
    - "&7Quặng Sắt: &f{amount}"
    - "&6Giá: &e{price}"
    - "&aDùng để nung lấy sắt"
  RAW_COPPER:
    - "&7Đồng Thô: &6{amount}"
    - "&6Giá: &e{price}"
  RAW_GOLD:
    - "&7Quặng Vàng: &e{amount}"
    - "&6Giá: &e{price}"
  REDSTONE:
    - "&7Đá Đỏ dùng để chế tạo máy"
    - "&cSố lượng: {amount}"
    - "&6Giá: &e{price}"
  LAPIS_LAZULI:
    - "&9Ngọc lưu ly để phù phép"
    - "&7SL: {amount}"
    - "&6Giá: &e{price}"
  EMERALD:
    - "&aDùng trao đổi với dân làng"
    - "&aCó: {amount}"
    - "&6Giá: &e{price}"
  DIAMOND:
    - "&bKim cương quý giá!"
    - "&7Tổng số: {amount}"
    - "&6Giá: &e{price}"
  QUARTZ:
    - "&fThạch anh từ Nether"
    - "&7Kho: {amount}"
    - "&6Giá: &e{price}"
  COBBLESTONE:
    - "&8Đá cuội dùng xây nhà"
    - "&7Có trong kho: {amount}"
    - "&6Giá: &e{price}"
  STONE:
    - "&7Đá thường"
    - "&7Lưu trữ: {amount}"
    - "&6Giá: &e{price}"

# =====================================================================
# 💰 ECONOMY - Cấu hình tiền tệ (Vault)
# =====================================================================
Economy:
  Provider: VAULT
  Currency: "$"

# =====================================================================
# 📦 DUNG LƯỢNG KHO
# =====================================================================

# Dung lượng mặc định (tổng tất cả vật phẩm)
MaxSpace: 100000

# =====================================================================
# 💲 BẢNG GIÁ BÁN VẬT PHẨM
# =====================================================================
Prices:
  COAL: 2.5
  RAW_IRON: 4.0
  RAW_COPPER: 3.0
  RAW_GOLD: 5.0
  REDSTONE: 1.5
  LAPIS_LAZULI: 2.0
  EMERALD: 12.0
  DIAMOND: 15.0
  QUARTZ: 4.0
  STONE: 0.5
  COBBLESTONE: 0.2
  GOLD_NUGGET: 0.5
  NETHERITE_SCRAP: 50.0
  IRON_INGOT: 6.0
  COPPER_INGOT: 4.5
  GOLD_INGOT: 7.5
  EMERALD_BLOCK: 110.0
  DIAMOND_BLOCK: 135.0
  IRON_BLOCK: 50.0
  COAL_BLOCK: 22.0
  GOLD_BLOCK: 70.0
  REDSTONE_BLOCK: 13.5
  LAPIS_BLOCK: 18.0

# =====================================================================
# 💾 DATABASE & AUTO SAVE
# =====================================================================

# Tự động lưu dữ liệu mỗi X giây (async, không gây lag)
AutoSaveInterval: 60

# =====================================================================
# 📜 LOG - Ghi nhật ký hành động
# =====================================================================
Log:
  Sales: true
  Transfer: true
  Withdraw: true
  RetentionDays: 30    # Tự động xóa log cũ hơn X ngày

######################################################################
# 📣 Reload bằng /jaostorage reload để áp dụng thay đổi              #
# 🛡️ Nếu có lỗi YAML, plugin sẽ load config mặc định                #
######################################################################
